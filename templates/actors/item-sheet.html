<form class="dino-sheet item" autocomplete="off">
  <header class="sheet-header">
    <div class="header-fields">
      <h1><input name="name" type="text" value="{{item.name}}" placeholder="Name" /></h1>
      <span class="item-type-badge">{{itemType}}</span>
    </div>
  </header>
  <div class="item-body">
    {{#if (dinoEq itemType "move")}}
    <div class="section-block">
      <label><strong>Stat</strong></label>
      <select name="system.stat">
        <option value="" {{#if (dinoEq system.stat "")}}selected{{/if}}>– kein Stat –</option>
        <option value="clever" {{#if (dinoEq system.stat "clever")}}selected{{/if}}>Clever</option>
        <option value="fit"    {{#if (dinoEq system.stat "fit")}}selected{{/if}}>Fit</option>
        <option value="steady" {{#if (dinoEq system.stat "steady")}}selected{{/if}}>Steady</option>
      </select>
    </div>
    {{/if}}
    {{#if (dinoEq itemType "gear")}}
    <div class="section-block">
      <label><strong>Menge</strong></label>
      <input type="number" name="system.quantity" value="{{system.quantity}}" min="0" style="width:70px" />
    </div>
    {{/if}}
    <div class="section-block">
      <label><strong>Beschreibung</strong></label>
      <textarea name="system.description" rows="6" placeholder="Beschreibe den Move oder Gegenstand…">{{system.description}}</textarea>
    </div>
  </div>
  <footer class="sheet-footer">
    <button type="submit" class="save-btn"><i class="fas fa-save"></i> Speichern</button>
  </footer>
</form>
